<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PantryMap – Food Bank Finder</title>
    <meta name="description"
        content="Find food banks near you. Search by address to see nearby food banks with phone numbers, ratings, and hours." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ── HEADER ─────────────────────────────────────────── -->
    <header class="app-header">
        <div class="header-brand">
            <span class="header-icon">🥫</span>
            <span class="header-title">PantryMap</span>
        </div>
        <p class="header-sub">Find food banks &amp; meal programs near you</p>
    </header>

    <!-- ── MAIN LAYOUT ────────────────────────────────────── -->
    <div class="app-layout">

        <!-- SIDE PANEL -->
        <aside class="side-panel" id="sidePanel">

            <!-- Search bar -->
            <div class="search-section">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="addressInput" class="search-input"
                        placeholder="Enter an address to find nearby food banks…" autocomplete="off" />
                    <button id="clearBtn" class="clear-btn" title="Clear search" hidden>✕</button>
                </div>
                <button id="searchBtn" class="search-btn">Search</button>
            </div>

            <!-- Status / sort bar -->
            <div class="panel-meta" id="panelMeta">
                <span id="resultCount" class="result-count">Loading food banks…</span>
                <select id="sortSelect" class="sort-select">
                    <option value="distance">Sort: Nearest first</option>
                    <option value="name">Sort: A–Z</option>
                </select>
            </div>

            <!-- Cards list -->
            <div class="card-list" id="cardList">
                <!-- Injected by JS -->
            </div>
        </aside>

        <!-- MAP -->
        <main class="map-container">
            <div id="map"></div>
            <!-- Loading overlay -->
            <div class="map-loader" id="mapLoader">
                <div class="spinner"></div>
                <p>Loading map…</p>
            </div>
        </main>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
